<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Talk to Cassandra</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 1.2rem; }
        #status {
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            margin-bottom: 30px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        .ready { background: #27ae60; }
        .thinking { background: #f39c12; }
        .speaking { background: #3498db; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        #transcript {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            min-height: 150px;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        #transcript .you { color: #3498db; display: block; margin-bottom: 15px; }
        #transcript .cassandra { color: #e74c3c; display: block; margin-bottom: 15px; }
        #transcript .system { color: #888; font-style: italic; }
        
        .mic-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #27ae60;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 4px solid white;
        }
        .mic-icon:hover { transform: scale(1.1); }
        .mic-icon.listening { background: #e74c3c; animation: pulse 1s infinite; }
        
        .info { color: #666; font-size: 0.9rem; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <h1>🤖 JARVIS</h1>
    <p class="subtitle">Always on • Just talk</p>
    
    <div id="status" class="ready">Tap mic to start</div>
    
    <div id="transcript">
        <div style="color: #666;">Conversation will appear here...</div>
    </div>
    
    <div class="mic-icon" id="micBtn" onclick="toggleMic()">🎤</div>
    
    <p class="info">Tap the mic once to start. Then just talk. No buttons needed after that.</p>

    <script>
        let recognition = null;
        let isListening = false;
        let isSpeaking = false;
        
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const micBtn = document.getElementById('micBtn');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusEl.textContent = 'Speech not supported';
            statusEl.className = '';
            statusEl.style.background = '#e74c3c';
        }
        
        function addTranscript(who, text) {
            if (transcriptEl.querySelector('div[style*="color: #666"]')) {
                transcriptEl.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = who;
            div.textContent = (who === 'you' ? '👤 ' : '🤖 ') + text;
            transcriptEl.appendChild(div);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
        
        function toggleMic() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }
        
        async function startListening() {
            try {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                recognition.maxAlternatives = 3;
                
                recognition.onstart = () => {
                    isListening = true;
                    statusEl.textContent = '🎤 Listening...';
                    statusEl.className = 'listening';
                    micBtn.classList.add('listening');
                };
                
                recognition.onresult = async (event) => {
                    if (isSpeaking) return;
                    
                    const results = Array.from(event.results);
                    const transcript = results.map(r => r[0].transcript).join('');
                    const isFinal = results[0].isFinal;
                    
                    if (isFinal && transcript.trim().length > 2) {
                        addTranscript('you', transcript);
                        statusEl.textContent = '🤔 Thinking...';
                        statusEl.className = 'thinking';
                        
                        await handleMessage(transcript);
                    }
                };
                
                recognition.onerror = (e) => {
                    console.log('Error:', e.error);
                    if (e.error === 'no-speech') {
                        // Just continue listening
                    } else {
                        statusEl.textContent = 'Error: ' + e.error;
                    }
                };
                
                recognition.onend = () => {
                    if (isListening) {
                        try { recognition.start(); } catch(e) {}
                    }
                };
                
                await navigator.mediaDevices.getUserMedia({ audio: true });
                recognition.start();
                
            } catch (e) {
                statusEl.textContent = 'Error: ' + e.message;
                statusEl.className = '';
                statusEl.style.background = '#e74c3c';
            }
        }
        
        function stopListening() {
            isListening = false;
            if (recognition) recognition.stop();
            statusEl.textContent = 'Tap mic to start';
            statusEl.className = 'ready';
            micBtn.classList.remove('listening');
        }
        
        async function handleMessage(text) {
            try {
                // Send to me via Telegram
                await fetch('https://api.telegram.org/bot8866420112:AAFESYanH0Y9YGE9yt45s1LkEoGkIgSj0b0/sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: '8883778761', text: text })
                });
                
                // Poll for reply
                const reply = await waitForReply(15000);
                if (reply) {
                    addTranscript('cassandra', reply);
                    speak(reply);
                } else {
                    addTranscript('cassandra', '[No response]');
                }
            } catch (e) {
                addTranscript('system', 'Error: ' + e.message);
            }
            
            if (isListening) {
                statusEl.textContent = '🎤 Listening...';
                statusEl.className = 'listening';
            }
        }
        
        async function waitForReply(timeout) {
            const start = Date.now();
            let lastUpdateId = 0;
            
            while (Date.now() - start < timeout) {
                try {
                    const response = await fetch('https://api.telegram.org/bot8866420112:AAFESYanH0Y9YGE9yt45s1LkEoGkIgSj0b0/getUpdates?timeout=1');
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            const msg = update.message;
                            if (msg && msg.from && msg.from.id == 8883778761 && msg.text) {
                                const updateId = update.update_id;
                                if (updateId > lastUpdateId) {
                                    lastUpdateId = updateId;
                                    return msg.text;
                                }
                            }
                        }
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 500));
            }
            return null;
        }
        
        function speak(text) {
            isSpeaking = true;
            statusEl.textContent = '🔊 Speaking...';
            statusEl.className = 'speaking';
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            utterance.onend = () => {
                isSpeaking = false;
                if (isListening) {
                    statusEl.textContent = '🎤 Listening...';
                    statusEl.className = 'listening';
                }
            };
            
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
