<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Talk to Cassandra</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        #status {
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        .ready { background: #27ae60; }
        .connecting { background: #f39c12; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #transcript {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            min-height: 100px;
            margin-bottom: 20px;
        }
        #transcript .you { color: #3498db; }
        #transcript .cassandra { color: #e74c3c; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #2980b9; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🤖 JARVIS</h1>
    <p class="subtitle">Talk to Cassandra</p>
    
    <div id="status" class="ready">Ready</div>
    
    <div id="transcript">
        <div style="color: #888;">Transcript will appear here...</div>
    </div>
    
    <button id="startBtn" onclick="startConversation()">🎤 Start Talking</button>

    <script>
        let mediaRecorder = null;
        let audioContext = null;
        let recognition = null;
        let isListening = false;
        
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const startBtn = document.getElementById('startBtn');
        
        // Use Web Speech API for STT
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusEl.textContent = 'Speech API not supported in this browser';
            statusEl.className = '';
            statusEl.style.background = '#e74c3c';
        }
        
        function addTranscript(who, text) {
            if (transcriptEl.querySelector('div[style="color: #888"]')) {
                transcriptEl.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = who;
            div.style.marginBottom = '10px';
            div.innerHTML = `<strong>${who === 'you' ? '👤 You' : '🤖 Cassandra'}:</strong> ${text}`;
            transcriptEl.appendChild(div);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
        
        async function startConversation() {
            try {
                // Request microphone
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Set up speech recognition
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                
                recognition.onstart = () => {
                    isListening = true;
                    statusEl.textContent = '🎤 Listening...';
                    statusEl.className = 'listening';
                    startBtn.textContent = '🛑 Stop';
                    startBtn.onclick = stopConversation;
                };
                
                recognition.onresult = async (event) => {
                    const transcript = Array.from(event.results)
                        .map(r => r[0].transcript)
                        .join('');
                    
                    if (event.results[0].isFinal) {
                        addTranscript('you', transcript);
                        statusEl.textContent = '🤔 Thinking...';
                        statusEl.className = 'connecting';
                        
                        // Send to Cassandra via Telegram
                        try {
                            const response = await fetch('https://api.telegram.org/bot8866420112:AAFESYanH0Y9YGE9yt45s1LkEoGkIgSj0b0/sendMessage', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    chat_id: '8883778761',
                                    text: transcript
                                })
                            });
                            
                            // Wait for response (simplified - polls for reply)
                            const reply = await waitForReply();
                            if (reply) {
                                addTranscript('cassandra', reply);
                                speak(reply);
                            }
                        } catch (e) {
                            console.error(e);
                            addTranscript('cassandra', 'Error sending message');
                        }
                        
                        statusEl.textContent = '🎤 Listening...';
                        statusEl.className = 'listening';
                    }
                };
                
                recognition.onerror = (e) => {
                    console.error('Speech error:', e);
                };
                
                recognition.onend = () => {
                    if (isListening) {
                        recognition.start();
                    }
                };
                
                recognition.start();
                
            } catch (e) {
                statusEl.textContent = 'Error: ' + e.message;
                statusEl.className = '';
                statusEl.style.background = '#e74c3c';
            }
        }
        
        function stopConversation() {
            isListening = false;
            if (recognition) recognition.stop();
            statusEl.textContent = 'Ready';
            statusEl.className = 'ready';
            startBtn.textContent = '🎤 Start Talking';
            startBtn.onclick = startConversation;
        }
        
        async function waitForReply() {
            // Poll for Cassandra's response
            for (let i = 0; i < 30; i++) {
                await new Promise(r => setTimeout(r, 1000));
                try {
                    const response = await fetch('https://api.telegram.org/bot8866420112:AAFESYanH0Y9YGE9yt45s1LkEoGkIgSj0b0/getUpdates?timeout=1');
                    const data = await response.json();
                    if (data.ok && data.result.length > 0) {
                        const lastMsg = data.result[data.result.length - 1];
                        const msg = lastMsg.message;
                        if (msg && msg.from && msg.from.id == 8883778761 && msg.text) {
                            return msg.text;
                        }
                    }
                } catch (e) {}
            }
            return null;
        }
        
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
